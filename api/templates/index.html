<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Pixel - Life Playlist</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        /* 보드게임 카드 같은 느낌을 주는 커스텀 클래스 */
        .game-card {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            border: 2px solid #000;
        }
        .btn-game {
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
            transition: all 0.1s;
        }
        .btn-game:active {
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
            transform: translate(2px, 2px);
        }
    </style>
</head>

<body class="min-h-[100dvh] flex flex-col items-center justify-center px-4 py-8 relative overflow-x-hidden gap-6">

    <div class="fixed inset-0 z-[-2]">
        <video autoplay loop muted playsinline class="w-full h-full object-cover">
            <source src="https://raw.githubusercontent.com/JungTaeCAU/record-pixel/refs/heads/main/public/static/background.mp4" type="video/mp4">
        </video>
    </div>

    <div class="fixed inset-0 z-[-1] bg-white/40 backdrop-blur-sm"></div>

    <div class="z-10 flex flex-col items-center gap-3 mt-auto sm:mt-0">
        <style>
            @keyframes spin-cw {
                from { transform: rotate(0deg); }
                to   { transform: rotate(360deg); }
            }
            .rotate-record {
                animation: spin-cw 4s linear infinite;
            }
        </style>
        <img src="https://raw.githubusercontent.com/JungTaeCAU/record-pixel/refs/heads/main/public/static/record.png" alt="Record"
             class="rotate-record rounded-full drop-shadow-lg"
             style="height: clamp(3rem, 15vw, 4rem); width: clamp(3rem, 15vw, 4rem); object-fit: cover;">
        <img src="https://raw.githubusercontent.com/JungTaeCAU/record-pixel/refs/heads/main/public/static/logo.png" alt="Record Pixel Logo"
             class="w-auto drop-shadow-md"
             style="height: clamp(4rem, 12vw, 6rem);">
    </div>
    
    <div id="quiz-container" class="game-card bg-white rounded-2xl p-6 sm:p-8 max-w-md w-full text-center relative overflow-hidden z-10 mb-auto sm:mb-0">
        
        <div class="absolute top-0 left-0 w-full bg-black text-white text-xs font-bold py-1 tracking-widest uppercase">
            Record Pixel Project
        </div>

        <h2 class="text-xl sm:text-2xl font-extrabold text-gray-900 mt-6 mb-2">당신의 기억 속<br>주파수를 맞춰볼까요?</h2>
        <p class="text-sm sm:text-base text-gray-500 mb-6 sm:mb-8 font-medium">나만의 인생 트랙리스트 찾기</p>
        
        <button 
            hx-post="/question/1" 
            hx-target="#quiz-container" 
            hx-swap="innerHTML"
            class="btn-game w-full bg-[#ff5a5f] hover:bg-[#ff4248] text-white font-bold py-3 sm:py-4 rounded-xl text-base sm:text-lg border-2 border-black">
            테스트 시작하기
        </button>
    </div>

</body>
</html>
