<div class="fade-in">
    <div class="absolute top-0 left-0 w-full bg-black text-white text-xs font-bold py-1 tracking-widest uppercase">
        Question {{ question.id }} / 10
    </div>

    <span class="inline-block bg-gray-100 text-gray-600 text-sm font-bold px-3 py-1 rounded-full border border-gray-300 mt-6 mb-4">
        {{ question.phase }}
    </span>
    
    <h3 class="text-xl font-bold text-gray-900 mb-8 leading-snug break-keep">
        {{ question.question }}
    </h3>
    
    <form hx-post="/question/{{ next_id }}" hx-target="#quiz-container" hx-swap="innerHTML" class="flex flex-col gap-3">
        {% for option in question.options %}
            <button 
                type="submit" 
                name="accumulated_traits" 
                value="{{ accumulated_traits }},{{ option.trait }}"
                class="btn-game w-full text-left bg-white border-2 border-black text-gray-800 font-semibold p-4 rounded-xl hover:bg-gray-50">
                {{ option.text }}
            </button>
        {% endfor %}
    </form>
</div>
