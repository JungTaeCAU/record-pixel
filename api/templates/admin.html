<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Pixel - 관리자 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-lg border-2 border-black overflow-hidden">
        
        <div class="bg-black text-white p-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight">Record Pixel 프로젝트</h1>
                <p class="text-gray-400 text-sm mt-1">고객 정보 및 결과 데이터베이스</p>
            </div>
            <div class="bg-gray-800 px-4 py-2 rounded-lg font-bold">
                총 참여자: <span class="text-[#ff5a5f]">{{ users|length }}</span>명
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-100 border-b-2 border-black text-gray-700 text-sm font-bold uppercase tracking-wider">
                        <th class="p-4 border-r border-gray-300">참여 시간</th>
                        <th class="p-4 border-r border-gray-300">이름</th>
                        <th class="p-4 border-r border-gray-300">전화번호</th>
                        <th class="p-4">결과 (페르소나)</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    {% if users %}
                        {% for user in users %}
                        <tr class="border-b border-gray-200 hover:bg-gray-50 transition-colors">
                            <td class="p-4 text-gray-500 whitespace-nowrap">{{ user['참여시간'] }}</td>
                            <td class="p-4 font-bold text-gray-900">{{ user['이름'] }}</td>
                            <td class="p-4 text-blue-600 font-medium">{{ user['전화번호'] }}</td>
                            <td class="p-4">
                                <span class="bg-gray-100 px-3 py-1 rounded-full text-gray-800 font-semibold border border-gray-300 text-xs">
                                    {{ user['결과_페르소나'] }}
                                </span>
                            </td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="4" class="p-10 text-center text-gray-500 font-medium">
                                아직 참여한 데이터가 없습니다.
                            </td>
                        </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
