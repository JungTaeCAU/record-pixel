<div class="fade-in text-center">
    <div class="absolute top-0 left-0 w-full bg-black text-white text-xs font-bold py-1 tracking-widest uppercase">
        Analysis Complete
    </div>

    <h2 class="text-2xl font-extrabold text-gray-900 mt-6 mb-4">기억의 조각들이<br>모두 모였습니다.</h2>
    <p class="text-gray-500 mb-6 font-medium break-keep">분석된 당신만의 플레이리스트와 기록표를 받아보실 정보를 남겨주세요.</p>
    
    <form hx-post="/result" hx-target="#quiz-container" hx-swap="innerHTML">
        <input type="hidden" name="accumulated_traits" value="{{ accumulated_traits }}">
        
        <div class="flex flex-col gap-3 mb-6">
            <input 
                type="text" 
                name="user_name" 
                placeholder="이름" 
                required
                class="w-full bg-gray-50 border-2 border-gray-300 text-gray-900 font-semibold p-4 rounded-xl focus:outline-none focus:border-black transition-colors">
                
            <input 
                type="tel" 
                name="phone_number" 
                placeholder="전화번호" 
                required
                class="w-full bg-gray-50 border-2 border-gray-300 text-gray-900 font-semibold p-4 rounded-xl focus:outline-none focus:border-black transition-colors">
        </div>
            
        <button 
            type="submit" 
            class="btn-game w-full bg-black text-white font-bold py-4 rounded-xl text-lg border-2 border-black hover:bg-gray-800">
            결과 확인하기
        </button>
    </form>
</div>
